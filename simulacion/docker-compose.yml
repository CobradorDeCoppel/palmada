services:
  servidor:
    image: python:3.9-alpine
    volumes:
      - .:/app
    working_dir: /app
    command: python servidor.py
    networks:
      - auqua_net

  sensor:
    image: python:3.9-alpine
    volumes:
      - .:/app
    working_dir: /app
    command: python sensor.py normal
    depends_on:
      - servidor
    networks:
      - auqua_net

  atacante:
    image: alpine:latest
    command: tail -f /dev/null
    networks:
      - auqua_net

networks:
  auqua_net:
    driver: bridge
